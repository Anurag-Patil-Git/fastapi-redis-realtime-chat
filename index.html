</div>

<script>
let ws;
let currentUser = "";
let users = new Set();
let rooms = new Set();

function updateRoomCount() {
    fetch("/rooms/count")
        .then(res => res.json())
        .then(data => {
            document.getElementById("roomCount").innerText = data.count;
        });
}

function connect() {
    const username = document.getElementById("username").value;
    const room = document.getElementById("room").value;

    currentUser = username;
    document.getElementById("roomName").innerText = room;
    document.getElementById("sidebarRoom").innerText = room;

    rooms.add(room);
    document.getElementById("roomCount").innerText = rooms.size;

    ws = new WebSocket("ws://localhost:8000/ws");

    ws.onopen = () => {
        ws.send(username);
        ws.send(room);
        updateRoomCount();
        updateRoomList();
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        updateRoomCount();
        updateRoomList();

        users.add(data.username);

        document.getElementById("userCount").innerText = users.size;

        // 🔥 update sidebar users
        document.getElementById("sidebarUsers").innerText =
            Array.from(users).join(", ");

        const row = document.createElement("div");
        row.classList.add("message-row");

        const bubble = document.createElement("div");
        bubble.classList.add("bubble");

        if (data.username === currentUser) {
            row.classList.add("me-row");
            bubble.classList.add("me");
        } else {
            row.classList.add("other-row");
            bubble.classList.add("other");
        }

        bubble.innerHTML = `<strong>${data.username}</strong>${data.message}`;

        row.appendChild(bubble);
        document.getElementById("messages").appendChild(row);

        const messages = document.getElementById("messages");
        messages.scrollTop = messages.scrollHeight;
    };

    document.getElementById("login").classList.add("hidden");
    document.getElementById("chat").classList.remove("hidden");
}

function sendMessage() {
    const input = document.getElementById("messageInput");

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        showToast("Please join a room to send messages");
        return;
    }

    if (input.value.trim() !== "") {
        ws.send(input.value);
        input.value = "";
    }
}
function showToast(message) {
    const toast = document.getElementById("toast");

    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);
}

function updateRoomList() {
    fetch("/rooms")
        .then(res => res.json())
        .then(data => {
            // const container = document.getElementById("roomList");
            // container.innerHTML = "";

            document.getElementById("roomList").innerText = data.rooms.join(", ");
            
            // document.getElementById("sidebarUsers").innerText =
            // Array.from(users).join(", ");

            data.rooms.forEach(room => {
                const div = document.createElement("div");
                div.innerText = room;

                div.style.padding = "6px";
                div.style.cursor = "pointer";
                div.style.borderRadius = "6px";

                div.onmouseenter = () => div.style.background = "#334155";
                div.onmouseleave = () => div.style.background = "transparent";

                // 🔥 click to auto-fill room input
                // div.onclick = () => {
                //     document.getElementById("room").value = room;
                //     connect();
                // };

                container.appendChild(div);
            });
        });
}


function clearDB() {
    if (confirm("Clear all messages?")) {
        fetch("/clear")
            .then(res => res.json())
            .then(data => {
                showToast(data.message); // 🔥 toast instead of alert
                document.getElementById("messages").innerHTML = "";
            })
            .catch(() => {
                showToast("Failed to clear messages");
            });
    }
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
});
window.onload = () => {
    updateRoomCount();
    updateRoomList();
};
</script>
<div id="toast" class="toast"></div>
